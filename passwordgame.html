<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Password Game: Ultimate Edition</title>
    <style>
        :root { --bg: #ffefd5; --card: #ffffff; --border: #000000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 600px; width: 100%; }
        .header { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; border-bottom: 2px solid #333; }
        textarea { width: 100%; height: 120px; font-size: 20px; padding: 10px; border: 3px solid var(--border); border-radius: 4px; resize: none; }
        #rules-container { display: flex; flex-direction: column-reverse; margin-top: 20px; gap: 15px; }
        .rule { padding: 15px; border: 2px solid var(--border); border-radius: 8px; background: var(--card); box-shadow: 4px 4px 0px var(--border); transition: 0.3s; }
        .rule.passed { background: #e6ffe6; border-color: #2e7d32; opacity: 0.8; }
        .rule.failed { background: #ffe6e6; border-color: #d32f2f; }
        .rule-num { font-weight: bold; font-size: 12px; color: #666; text-transform: uppercase; }
        
        /* Finale Styles */
        #finale-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #timer { font-size: 40px; font-weight: bold; color: red; }
        #retype-area { width: 80%; height: 150px; margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>The Password Game</h1>
        <p>Type your password:</p>
        <textarea id="main-input" placeholder="Start typing..."></textarea>
        <div style="display: flex; justify-content: space-between; font-weight: bold;">
            <span>Characters: <span id="count">0</span></span>
        </div>
    </div>

    <div id="rules-container"></div>
</div>

<div id="finale-overlay">
    <h1>Is this your final password?</h1>
    <p>You have 2 minutes to retype it exactly from memory/copy to win.</p>
    <div id="timer">02:00</div>
    <textarea id="retype-area" placeholder="Retype it here..."></textarea>
    <div id="match-status"></div>
</div>

<script>
    const input = document.getElementById('main-input');
    const container = document.getElementById('rules-container');
    const countDisplay = document.getElementById('count');
    
    // --- 35 RULES (Logic adjusted for a single-file environment) ---
    const allRules = [
        { id: 1, text: "At least 5 characters.", check: p => p.length >= 5 },
        { id: 2, text: "Include a number.", check: p => /\d/.test(p) },
        { id: 3, text: "Include an uppercase letter.", check: p => /[A-Z]/.test(p) },
        { id: 4, text: "Include a special character.", check: p => /[^A-Za-z0-9]/.test(p) },
        { id: 5, text: "Digits must add up to 25.", check: p => (p.match(/\d/g) || []).reduce((a,b) => a + Number(b), 0) === 25 },
        { id: 6, text: "Include a month of the year.", check: p => /january|february|march|april|may|june|july|august|september|october|november|december/i.test(p) },
        { id: 7, text: "Include a Roman numeral.", check: p => /[IVXLCDM]/.test(p) },
        { id: 8, text: "Include one of these sponsors: Google, Starbucks, or Pepsi.", check: p => /google|starbucks|pepsi/i.test(p) },
        { id: 9, text: "Roman numerals must multiply to 35.", check: p => {
            const matches = p.match(/[IVXLCDM]+/g);
            return matches ? matches.includes("XXXV") || (p.includes("V") && p.includes("VII")) : false; // Simplified logic
        }},
        { id: 10, text: "Include a CAPTCHA: 6j8p2", check: p => p.includes("6j8p2") },
        { id: 11, text: "Include today's Wordle answer: GHOST.", check: p => p.toLowerCase().includes("ghost") },
        { id: 12, text: "Include a 2-letter symbol from the periodic table.", check: p => /He|Li|Be|Ne|Na|Mg|Al|Si|Cl|Ar|Ca|Sc|Ti|Cr|Mn|Fe|Co|Ni|Cu|Zn|Ga|Ge|As|Se|Br|Kr/i.test(p) },
        { id: 13, text: "Include the current phase of the moon: 🌑", check: p => p.includes("🌑") },
        { id: 14, text: "Include the name of this country: 🇮🇹", check: p => p.toLowerCase().includes("italy") },
        { id: 15, text: "Include a leap year.", check: p => {
            const yrs = p.match(/\d{4}/g);
            return yrs ? yrs.some(y => (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0) : false;
        }},
        { id: 16, text: "Include the best move in this chess puzzle: Ng5.", check: p => p.includes("Ng5") },
        { id: 17, text: "Paul the chicken has hatched. 🥚 Keep him in your password.", check: p => p.includes("🥚") },
        { id: 18, text: "Include atomic numbers that add up to 100.", check: p => p.includes("100") }, // Placeholder
        { id: 19, text: "All vowels must be bolded (use uppercase).", check: p => !/[aeiou]/.test(p) }, // Rule forces uppercase vowels
        { id: 20, text: "Your password is on fire! 💥 Extinguish it (Delete the fire emoji).", check: p => !p.includes("🔥") },
        { id: 21, text: "Include a 4-digit hex color code.", check: p => /#[0-9A-Fa-f]{3,6}/.test(p) },
        { id: 22, text: "Include the length of your password in your password.", check: p => p.includes(p.length.toString()) },
        { id: 23, text: "Feed Paul! Paul needs 3 worm emojis: 🪱🪱🪱", check: p => (p.match(/🪱/g) || []).length >= 3 },
        { id: 24, text: "Include a YouTube URL that is 10 min long.", check: p => p.includes("youtube.com") },
        { id: 25, text: "Pick a card, any card: 🂡", check: p => p.includes("🂡") },
        { id: 26, text: "The password must contain 20% numbers.", check: p => (p.match(/\d/g) || []).length >= p.length * 0.2 },
        { id: 27, text: "Include the current time (HH:MM).", check: p => /\d{1,2}:\d{2}/.test(p) },
        { id: 28, text: "Your password must be a palindrome.", check: p => {
            let clean = p.replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
            return clean === clean.split("").reverse().join("");
        }},
        { id: 29, text: "No repeat characters allowed.", check: p => new Set(p).size === p.length },
        { id: 30, text: "Include a font size: 24px.", check: p => p.includes("24px") },
        { id: 31, text: "Digits must be prime numbers.", check: p => !/[014689]/.test(p.match(/\d/g)?.join("") || "") },
        { id: 32, text: "Include a school subject.", check: p => /math|science|history|english|art/i.test(p) },
        { id: 33, text: "Password must be at least 50 characters.", check: p => p.length >= 50 },
        { id: 34, text: "Delete all numbers.", check: p => !/\d/.test(p) }, // This creates a paradox!
        { id: 35, text: "The final rule: Is this your final password?", check: p => true }
    ];

    let unlockedCount = 1;
    let finalPassword = "";

    function update() {
        const val = input.value;
        countDisplay.textContent = val.length;
        container.innerHTML = '';
        let allPassed = true;

        for (let i = 0; i < unlockedCount; i++) {
            const rule = allRules[i];
            const passed = rule.check(val);
            const div = document.createElement('div');
            div.className = `rule ${passed ? 'passed' : 'failed'}`;
            div.innerHTML = `<div class="rule-num">Rule ${rule.id}</div><div class="rule-text">${passed ? '✅' : '❌'} ${rule.text}</div>`;
            container.appendChild(div);
            if (!passed) allPassed = false;
        }

        if (allPassed && unlockedCount < allRules.length) {
            unlockedCount++;
            update();
        } else if (allPassed && unlockedCount === 35) {
            triggerFinale(val);
        }
    }

    function triggerFinale(pw) {
        finalPassword = pw;
        document.getElementById('finale-overlay').style.display = 'flex';
        let timeLeft = 120;
        const timerElem = document.getElementById('timer');
        const retypeArea = document.getElementById('retype-area');

        const countdown = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            timerElem.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                alert("Time is up! You failed.");
                location.reload();
            }
        }, 1000);

        retypeArea.addEventListener('input', () => {
            if (retypeArea.value === finalPassword) {
                clearInterval(countdown);
                document.body.innerHTML = "<h1 style='color:gold; font-size: 100px;'>YOU WIN!</h1>";
            }
        });
    }

    input.addEventListener('input', update);
    update();
</script>
</body>
</html>
